<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b" />
      <stop offset="50%" stop-color="#0f0c31" />
      <stop offset="100%" stop-color="#050211" />
    </linearGradient>
    
    <!-- Title Gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="50%" stop-color="#7f00ff" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>

    <!-- Subtitle/Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#7f00ff" />
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Rect -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Ambient Light/Glow Circles -->
  <circle cx="200" cy="100" r="150" fill="#ff007f" opacity="0.15" filter="url(#glow)" />
  <circle cx="1000" cy="300" r="200" fill="#00f0ff" opacity="0.12" filter="url(#glow)" />
  <circle cx="600" cy="200" r="180" fill="#7f00ff" opacity="0.1" filter="url(#glow)" />

  <!-- Abstract VFX Geometric Mesh Patterns -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.15">
    <line x1="0" y1="200" x2="1200" y2="200" />
    <line x1="600" y1="0" x2="600" y2="400" />
    <!-- Grid perspective lines -->
    <line x1="600" y1="200" x2="-200" y2="450" stroke-width="1" />
    <line x1="600" y1="200" x2="200" y2="450" stroke-width="1" />
    <line x1="600" y1="200" x2="1000" y2="450" stroke-width="1" />
    <line x1="600" y1="200" x2="1400" y2="450" stroke-width="1" />
    <line x1="600" y1="200" x2="-200" y2="-50" stroke-width="1" />
    <line x1="600" y1="200" x2="200" y2="-50" stroke-width="1" />
    <line x1="600" y1="200" x2="1000" y2="-50" stroke-width="1" />
    <line x1="600" y1="200" x2="1400" y2="-50" stroke-width="1" />
  </g>

  <!-- Glowing VFX Nodes / Particles -->
  <circle cx="350" cy="150" r="4" fill="#ff007f" filter="url(#glow)" />
  <circle cx="850" cy="250" r="6" fill="#00f0ff" filter="url(#glow)" />
  <circle cx="500" cy="300" r="5" fill="#7f00ff" filter="url(#glow)" />
  <circle cx="700" cy="100" r="3" fill="#ffffff" opacity="0.8" />

  <!-- Main Title -->
  <text x="50%" y="180" font-family="'Outfit', 'Inter', sans-serif" font-weight="900" font-size="72" fill="url(#titleGrad)" text-anchor="middle" letter-spacing="4" filter="drop-shadow(0px 15px 20px rgba(0,0,0,0.7))">
    AWESOME VFX AI AGENTS
  </text>

  <!-- Subtitle -->
  <text x="50%" y="240" font-family="'Outfit', 'Inter', sans-serif" font-weight="600" font-size="24" fill="url(#accentGrad)" text-anchor="middle" letter-spacing="8" opacity="0.9">
    VIDEO GENERATION &amp; VISUAL EFFECTS ECOSYSTEM
  </text>

  <!-- Tagline / Small text -->
  <text x="50%" y="300" font-family="'Inter', sans-serif" font-weight="400" font-size="16" fill="#8f9cae" text-anchor="middle" letter-spacing="3" opacity="0.8">
    CURATED LIST OF SAAS PLATFORMS • OPEN-SOURCE PROJECTS • LOCAL AGENTS
  </text>

  <!-- Decorative border line -->
  <rect x="20" y="20" width="1160" height="360" rx="15" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.3" />
</svg>
